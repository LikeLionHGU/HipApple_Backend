spring:
  application:
    name: lion-apple
  config:
    import: optional:file:./application-secret.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lion_apple?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:964129047813-hdnng4fd73r6cmvt5mid5u6ime9d6l39.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

app:
  jwt:
    secret: ${JWT_SECRET:hipapple-local-development-jwt-secret-change-me}
    expiration-seconds: 86400
  ai-server:
    url: ${AI_SERVER_URL:http://localhost:8000}
  forecast:
    file: ${FORECAST_FILE:./ai-server/out/forecasts.json}
